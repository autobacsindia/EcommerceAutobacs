name: CI - Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests & Enforce Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: Autobacs/Back-end/server/package-lock.json

      - name: Install dependencies
        working-directory: Autobacs/Back-end/server
        run: npm ci

      - name: Run tests with coverage
        working-directory: Autobacs/Back-end/server
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-ci-secret-key
          RAZORPAY_KEY_ID: rzp_test_ci
          RAZORPAY_KEY_SECRET: test_secret_ci
          MONGODB_URI: mongodb://localhost:27017/test-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./Autobacs/Back-end/server/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true

      - name: Check coverage thresholds
        working-directory: Autobacs/Back-end/server
        run: |
          echo "Coverage thresholds enforced in jest.config.js:"
          echo "- Global Lines: 60%"
          echo "- Global Functions: 60%"
          echo "- Global Branches: 50%"
          echo "- Global Statements: 60%"
          echo ""
          echo "Jest will FAIL if thresholds are not met!"

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: Autobacs/Back-end/server/package-lock.json

      - name: Install dependencies
        working-directory: Autobacs/Back-end/server
        run: npm ci

      - name: Run ESLint
        working-directory: Autobacs/Back-end/server
        run: npx eslint . --ext .js,.mjs --max-warnings=0
        continue-on-error: true

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: Autobacs/Back-end/server/package-lock.json

      - name: Install dependencies
        working-directory: Autobacs/Back-end/server
        run: npm ci

      - name: Verify build (if applicable)
        working-directory: Autobacs/Back-end/server
        run: echo "Backend is interpreted - no build step needed"
