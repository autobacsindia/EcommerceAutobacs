# One-off maintenance workflow: regenerate a cross-platform-complete frontend
# package-lock.json on Linux/Node 20 (matching CI + Vercel), prove strict
# `npm ci` works against it, and upload it as an artifact.
# Run: gh workflow run regenerate-lock.yml --ref develop
name: Regenerate frontend lock

on:
  workflow_dispatch:
  # Also runs when this file changes on develop, so it can be triggered without
  # being registered on the default branch.
  push:
    branches: [develop]
    paths: [".github/workflows/regenerate-lock.yml"]

jobs:
  regen:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Front-end/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Regenerate lock from package.json
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Verify strict `npm ci` succeeds against the new lock
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps

      - name: Upload regenerated lock
        uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: Front-end/web/package-lock.json
          retention-days: 3
