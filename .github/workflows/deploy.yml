# deploy.yml — Test-gated Railway deployment (BACKEND ONLY)
#
# Replaces Railway's native GitHub auto-deploy (which needs a Pro plan when the
# repo has multiple collaborators).
#
# Triggers:
#   • push to main            → deploys when Back-end/server/** changed, gated on tests.
#   • workflow_dispatch       → MANUAL "Run workflow" button (Actions tab). This is the
#                               redeploy control: use it to re-ship the current main after
#                               a transient Railway hiccup. Leave "run_tests" checked for a
#                               full gated deploy, or uncheck it for a fast redeploy of an
#                               already-tested commit.
#
# Reliability: `railway up` occasionally returns "service unavailable" (Railway-side, not a
# build failure). The deploy step retries the whole command up to 3× with backoff so a
# transient blip no longer fails the run.
#
# The FRONTEND was migrated off Railway to Vercel. Vercel owns the frontend build + deploy
# via its Git integration (production on push to main, preview deploy per PR). Frontend CI
# lives in ci-frontend.yml (runs on main too), enforced via branch protection.
#
# The backend uses a project-scoped token (only deploys services in its project):
#   backend → project "bountiful-surprise", service "EcommerceAutobacs"
#
# Required GitHub repository secrets:
#   RAILWAY_BACKEND_TOKEN   — project token for the backend project (production env)

name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run lint + tests before deploying (uncheck for a fast redeploy of an already-tested commit)"
        type: boolean
        default: true

# Serialize deploys: never let two backend deploys to the same ref run at once. We do NOT
# cancel an in-progress deploy (cancelling mid `railway up` is undesirable); a newer run
# queues until the current one finishes.
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Detect what changed (and force-deploy on manual dispatch) ────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.decide.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            backend:
              - 'Back-end/server/**'
      - id: decide
        # Manual dispatch always deploys the backend; push deploys only on a backend change.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Backend tests (skippable only via a manual fast-redeploy) ────────────────
  test-backend:
    name: Lint + Test Backend
    needs: [changes]
    # Run on a backend change, EXCEPT when a manual dispatch explicitly unchecks run_tests.
    if: >-
      needs.changes.outputs.backend == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.run_tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Back-end/server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Back-end/server/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: placeholder_secret
          SENDGRID_API_KEY: SG.placeholder
          SENDGRID_FROM_EMAIL: ci@example.com
          EMAIL_FROM: ci@example.com
          WORDPRESS_SITE_URL: http://localhost
          WORDPRESS_API_KEY: ck_placeholder
          WORDPRESS_API_SECRET: cs_placeholder
        run: npm run test:coverage -- --forceExit --testPathPatterns="orderStatusService|uploadMiddleware|auth\.integration|productImageController|e2e\.product-lifecycle"

  deploy-backend:
    name: Deploy Backend → Railway
    needs: [changes, test-backend]
    # Deploy when the backend is in scope AND tests did not fail. test-backend is 'skipped'
    # on a manual fast-redeploy (run_tests unchecked) — which is allowed; only a real
    # 'failure'/'cancelled' blocks the deploy.
    if: >-
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.test-backend.result != 'failure' &&
      needs.test-backend.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # No --detach: we WAIT for the Railway build so a failed image build fails this job
      # (visible in Actions). `railway up` is retried up to 3× to ride out Railway's
      # transient "service unavailable" responses, which are not build failures.
      - name: Deploy (with retry)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_BACKEND_TOKEN }}
        working-directory: Back-end/server
        run: |
          set -u
          for attempt in 1 2 3; do
            echo "::group::railway up — attempt ${attempt}/3"
            if railway up --service=EcommerceAutobacs --ci; then
              echo "::endgroup::"
              echo "✓ Deploy succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            echo "✗ Attempt ${attempt} failed"
            if [ "${attempt}" -lt 3 ]; then
              echo "Retrying in 30s…"
              sleep 30
            fi
          done
          echo "::error::Deploy failed after 3 attempts (likely Railway-side). Re-run via the Actions 'Run workflow' button."
          exit 1

  # ── Frontend ───────────────────────────────────────────────────────────────
  # Frontend deploy intentionally removed: Vercel owns build + deploy via its Git
  # integration. CI for the frontend lives in ci-frontend.yml (runs on main too).
