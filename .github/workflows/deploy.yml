# deploy.yml — Test-gated Railway deployment (BACKEND ONLY)
#
# Replaces Railway's native GitHub auto-deploy (which needs a Pro plan when the
# repo has multiple collaborators). Runs only on push to main.
#
# The backend deploys only when Back-end/server/** changed, gated on its lint + tests.
#
# The FRONTEND was migrated off Railway to Vercel. Vercel owns the frontend build +
# deploy via its Git integration (production on push to main, preview deploy per PR).
# Frontend lint/test/build CI lives entirely in ci-frontend.yml (which now runs on main
# too) and is enforced as a required check via branch protection.
#
# The backend uses a project-scoped token (only deploys services in its project):
#   backend → project "bountiful-surprise", service "EcommerceAutobacs"
#
# Required GitHub repository secrets:
#   RAILWAY_BACKEND_TOKEN   — project token for the backend project (production env)

name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  # ── Detect which app changed ────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Back-end/server/**'

  # ── Backend ────────────────────────────────────────────────────────────────
  test-backend:
    name: Lint + Test Backend
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Back-end/server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Back-end/server/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: placeholder_secret
          SENDGRID_API_KEY: SG.placeholder
          SENDGRID_FROM_EMAIL: ci@example.com
          EMAIL_FROM: ci@example.com
          WORDPRESS_SITE_URL: http://localhost
          WORDPRESS_API_KEY: ck_placeholder
          WORDPRESS_API_SECRET: cs_placeholder
        run: npm run test:coverage -- --forceExit --testPathPatterns="orderStatusService|uploadMiddleware|auth\.integration|productImageController|e2e\.product-lifecycle"

  deploy-backend:
    name: Deploy Backend → Railway
    needs: [test-backend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # No --detach: we WAIT for the Railway build so a failed image build fails
      # this job (visible in Actions) instead of silently returning success.
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_BACKEND_TOKEN }}
        run: railway up --service=EcommerceAutobacs --ci
        working-directory: Back-end/server

  # ── Frontend ───────────────────────────────────────────────────────────────
  # Frontend deploy intentionally removed: Vercel owns build + deploy via its Git
  # integration. CI for the frontend lives in ci-frontend.yml (runs on main too).
