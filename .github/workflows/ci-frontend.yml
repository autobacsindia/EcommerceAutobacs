# CI — Frontend (Next.js)
#
# Runs on every push and pull-request that touches Front-end/web/** or
# this workflow file itself.
#
# Jobs (run in order — build is gated on lint + test passing):
#   lint   — next lint (ESLint is skipped during next build, so runs here)
#   test   — jest unit tests
#   build  — next build (TypeScript errors fail the build; ignoreBuildErrors: false)
#   deploy — vercel deploy --prod (push to main only, gated on lint+test+build)
#
# DEPLOY: The frontend is deployed to Vercel from CI using the project owner's
# Vercel token (secrets.VERCEL_TOKEN), NOT via Vercel's Git integration. Vercel's
# Git auto-deploy is disabled in Front-end/web/vercel.json (git.deploymentEnabled.main
# = false) because, on the owner's Hobby plan, a push authored by a repo collaborator
# (not the Hobby account owner) gets rejected. Deploying via the owner's token here
# attributes the deploy to the owner, so it is accepted regardless of who pushed.
#
# Required GitHub repository secrets (all from the OWNER's Vercel account):
#   VERCEL_TOKEN        — access token from vercel.com/account/tokens (owner's account)
#   VERCEL_ORG_ID       — from .vercel/project.json after `vercel link` (a.k.a. teamId/orgId)
#   VERCEL_PROJECT_ID   — from .vercel/project.json after `vercel link`
#
# Build happens on Vercel (remote), so Production env vars stay in the Vercel
# dashboard and are never duplicated into CI.

name: Frontend CI

on:
  # Runs on every branch including main. The frontend deploys via this workflow's
  # `deploy` job (Vercel CLI), so this workflow is the single source of frontend CI
  # and is the required status check enforced by branch protection on main.
  push:
    paths:
      - "Front-end/web/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "Front-end/web/**"
      - ".github/workflows/ci-frontend.yml"
  # Manual redeploy of current main — use after a Vercel hiccup or an env-var change
  # that needs a rebuild without a code change.
  workflow_dispatch:

defaults:
  run:
    working-directory: Front-end/web

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Front-end/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Front-end/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Runs the curated, passing suite set (jest.ci.config.js quarantines
      # known-failing suites — see that file). Playwright e2e specs are excluded
      # via jest.config.js testPathIgnorePatterns and run separately.
      - name: Run tests
        env:
          NODE_ENV: test
          NEXT_PUBLIC_API_URL: http://localhost:5000
        run: npm run test:ci -- --forceExit --passWithNoTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: Front-end/web/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Front-end/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_TELEMETRY_DISABLED: 1
          # Sentry source-map upload is skipped when SENTRY_AUTH_TOKEN is absent —
          # this is intentional in CI; uploads happen only from Railway on deploy.
        run: npm run build

  deploy:
    name: Deploy → Vercel (production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test, build]
    # Production deploy only from main (push) or a manual redeploy. Never on PRs
    # (secrets are unavailable to forked-PR runs and we don't want preview noise here).
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    # Serialize production deploys so two pushes can't race the same Vercel project.
    concurrency:
      group: deploy-frontend-production
      cancel-in-progress: false
    # Override the workflow-level working-directory: the Vercel project's Root
    # Directory (Front-end/web) is configured in the dashboard, so we deploy from
    # the repo root and let Vercel resolve the monorepo subdir.
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Remote build: Vercel builds using the Production env vars configured in the
      # project dashboard. `--yes` skips interactive prompts; org/project are read
      # from the VERCEL_ORG_ID / VERCEL_PROJECT_ID env vars.
      - name: Deploy to Vercel (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployed: $url"
          echo "### ✅ Frontend deployed to Vercel" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"
