# CI — Frontend (Next.js)
#
# Runs on every push and pull-request.
#
# WHY NO `paths:` FILTER: a required status check whose workflow is skipped by a
# path filter stays "pending" forever and permanently BLOCKS the PR (a backend-only
# PR could never satisfy the required "Build" check). Instead every job ALWAYS runs
# and reports a status; a shared `changes` job decides — via a dependency-free
# `git diff` — whether the frontend was touched, and the lint/test/build jobs skip
# their expensive STEPS when it wasn't. Skipping is at the step level (each job still
# concludes "success"), never at the job level (which reports the ambiguous "skipped"
# conclusion that required checks treat inconsistently).
#
# Jobs (build is gated on lint + test passing):
#   changes — detect whether Front-end/web/** (or this workflow) changed
#   lint    — next lint (ESLint is skipped during next build, so runs here)
#   test    — jest unit tests
#   build   — next build (TypeScript errors fail the build; ignoreBuildErrors: false)
#
# DEPLOY is NOT done here. The frontend deploys via Vercel's native Git integration
# (vercel.json → git.deploymentEnabled.main = true) on push to main. This workflow is
# purely the gate: its Build check is required by branch protection on main, so an
# unvetted commit can never be merged — and therefore never deployed.
# Hobby's commit-author check holds because main only advances via owner-merged PRs.

name: Frontend CI

on:
  push:
  pull_request:
    branches: ["**"]

defaults:
  run:
    working-directory: Front-end/web

jobs:
  # Single source of truth for "did the frontend change?". Fail-safe: if the base
  # commit can't be resolved (first push, force-push, shallow clone) it returns true
  # so the full suite runs rather than skipping the gate.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: detect
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] \
             || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "No resolvable base commit; running full suite (fail-safe)."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" HEAD \
               | grep -qE '^(Front-end/web/|\.github/workflows/ci-frontend\.yml$)'; then
            echo "Frontend changes detected; running full suite."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No frontend changes; reporting success without running the suite."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        if: needs.changes.outputs.run == 'true'
        uses: actions/checkout@v7

      - name: Set up Node.js
        if: needs.changes.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Front-end/web/package-lock.json

      # Strict, reproducible install. The lock is cross-platform-complete
      # (regenerated on Linux/Node 20); --legacy-peer-deps matches how the lock
      # and the Vercel/Docker builds resolve peers.
      - name: Install dependencies
        if: needs.changes.outputs.run == 'true'
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        if: needs.changes.outputs.run == 'true'
        run: npm run lint

  test:
    name: Unit Tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        if: needs.changes.outputs.run == 'true'
        uses: actions/checkout@v7

      - name: Set up Node.js
        if: needs.changes.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Front-end/web/package-lock.json

      # Strict, reproducible install. The lock is cross-platform-complete
      # (regenerated on Linux/Node 20); --legacy-peer-deps matches how the lock
      # and the Vercel/Docker builds resolve peers.
      - name: Install dependencies
        if: needs.changes.outputs.run == 'true'
        run: npm ci --legacy-peer-deps

      # Runs the curated, passing suite set (jest.ci.config.js quarantines
      # known-failing suites — see that file). Playwright e2e specs are excluded
      # via jest.config.js testPathIgnorePatterns and run separately.
      - name: Run tests
        if: needs.changes.outputs.run == 'true'
        env:
          NODE_ENV: test
          NEXT_PUBLIC_API_URL: http://localhost:5000
        run: npm run test:ci -- --forceExit --passWithNoTests

      - name: Upload test results
        if: always() && needs.changes.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: Front-end/web/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, lint, test]
    # Always run (unless the run was cancelled) so the required "Build" context
    # always reports a concrete success/failure — never the ambiguous "skipped"
    # that a failed `needs` would otherwise produce.
    if: ${{ !cancelled() }}

    steps:
      # Deterministic gate: if the frontend changed and lint or tests failed, FAIL
      # here (don't let Build silently skip and report an ambiguous status).
      - name: Require lint & tests to have passed
        if: >-
          needs.changes.outputs.run == 'true' &&
          (needs.lint.result != 'success' || needs.test.result != 'success')
        run: |
          echo "Lint result: ${{ needs.lint.result }}"
          echo "Test result: ${{ needs.test.result }}"
          echo "Blocking: lint and/or unit tests did not pass."
          exit 1

      - name: Checkout repository
        if: needs.changes.outputs.run == 'true'
        uses: actions/checkout@v7

      - name: Set up Node.js
        if: needs.changes.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Front-end/web/package-lock.json

      # Strict, reproducible install. The lock is cross-platform-complete
      # (regenerated on Linux/Node 20); --legacy-peer-deps matches how the lock
      # and the Vercel/Docker builds resolve peers.
      - name: Install dependencies
        if: needs.changes.outputs.run == 'true'
        run: npm ci --legacy-peer-deps

      - name: Build
        if: needs.changes.outputs.run == 'true'
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_TELEMETRY_DISABLED: 1
          # Sentry source-map upload is skipped when SENTRY_AUTH_TOKEN is absent —
          # intentional in CI; uploads happen on Vercel at deploy time.
        run: npm run build
