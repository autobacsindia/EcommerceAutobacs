<!DOCTYPE html>
<html>
<head>
    <title>Test Brand Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">Profender Brand Page Test</h1>
        
        <div id="loading" class="text-center py-8">
            <p>Loading Profender products...</p>
        </div>
        
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Products will be loaded here -->
        </div>
        
        <div id="error-message" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded hidden">
            <!-- Error messages will appear here -->
        </div>
    </div>

    <script>
        async function loadProfenderProducts() {
            const loadingElement = document.getElementById('loading');
            const productsContainer = document.getElementById('products-container');
            const errorMessage = document.getElementById('error-message');
            
            try {
                loadingElement.classList.remove('hidden');
                productsContainer.classList.add('hidden');
                errorMessage.classList.add('hidden');
                
                const response = await fetch('http://localhost:5000/products?brand=Profender');
                const data = await response.json();
                
                if (data.success) {
                    displayProducts(data.products);
                    loadingElement.classList.add('hidden');
                    productsContainer.classList.remove('hidden');
                } else {
                    throw new Error(data.message || 'Failed to load products');
                }
            } catch (error) {
                loadingElement.classList.add('hidden');
                errorMessage.textContent = `Error: ${error.message}`;
                errorMessage.classList.remove('hidden');
                console.error('Error loading products:', error);
            }
        }
        
        function displayProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'bg-white rounded-lg shadow-md overflow-hidden';
                productCard.innerHTML = `
                    <div class="p-4">
                        <h3 class="text-xl font-semibold mb-2">${product.name}</h3>
                        <p class="text-gray-600 mb-4">${product.shortDescription || product.description?.substring(0, 100) + '...' || ''}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-bold text-blue-600">₹${product.price}</span>
                            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                                View Details
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(productCard);
            });
        }
        
        // Load products when page loads
        document.addEventListener('DOMContentLoaded', loadProfenderProducts);
    </script>
</body>
</html>
