# mongod.conf

# for documentation of all options, see:
#   http://docs.mongodb.org/manual/reference/configuration-options/

# Where and how to store data.
storage:
  dbPath: C:\Main project\Autobacs\Back-end\server\mongodb-data

# where to write logging data.
systemLog:
  destination: file
  logAppend: true
  path: C:\Main project\Autobacs\Back-end\server\mongod.log

# network interfaces
net:
  port: 27017
  bindIp: 127.0.0.1

# Security settings (authentication disabled for now)
#security:
#  authorization: enabled

#processManagement:

#operationProfiling:

#replication:

#sharding:

