# MongoDB configuration for stability
storage:
  dbPath: C:\Main project\Autobacs\Back-end\server\mongodb-data

systemLog:
  destination: file
  logAppend: true
  path: C:\Main project\Autobacs\Back-end\server\mongod-stable.log

net:
  port: 27017
  bindIp: 127.0.0.1

