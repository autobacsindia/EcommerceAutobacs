version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: autobacs-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: your_secure_password
      MONGO_INITDB_DATABASE: autobacs
    volumes:
      - mongodb_data:/data/db
    networks:
      - autobacs-network

  # Backend API Server
  backend:
    build: 
      context: ./Back-end/server
      dockerfile: Dockerfile
    container_name: autobacs-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://admin:your_secure_password@mongodb:27017/autobacs?authSource=admin
      - JWT_SECRET=your_production_secret_key_change_this
      - FRONTEND_URL=https://yourdomain.com
      # Add other environment variables here
    depends_on:
      - mongodb
    networks:
      - autobacs-network

  # Frontend Application
  frontend:
    build:
      context: ./Front-end/web
      dockerfile: Dockerfile
    container_name: autobacs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=https://api.yourdomain.com
    depends_on:
      - backend
    networks:
      - autobacs-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: autobacs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - autobacs-network

volumes:
  mongodb_data:
    driver: local

networks:
  autobacs-network:
    driver: bridge